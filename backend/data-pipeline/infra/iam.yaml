Resources:
  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - Fn::GetAtt:
            - GlueServiceManagedPolicy
            - PolicyArn

  GlueServiceManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Permissions for AWS Glue jobs and crawlers in the Smart Healthcare pipeline.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: S3AccessForDataLake
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - arn:aws:s3:::${self:custom.bucketName}
              - arn:aws:s3:::${self:custom.bucketName}/*

          - Sid: GlueCatalogAndJobAccess
            Effect: Allow
            Action:
              - glue:*
            Resource: "*"

          - Sid: CloudWatchLogsAccess
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:AssociateKmsKey
            Resource: "*"

          - Sid: InvokeDashboardExportLambda
            Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource:
              Fn::GetAtt:
                - ExportDashboardMetricsLambdaFunction
                - Arn

  StepFunctionsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - Fn::GetAtt:
            - StepFunctionsExecutionManagedPolicy
            - PolicyArn

  StepFunctionsExecutionManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Permissions for Step Functions to orchestrate Glue crawlers and Glue jobs.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: GlueCrawlerAndJobOrchestration
            Effect: Allow
            Action:
              - glue:StartCrawler
              - glue:GetCrawler
              - glue:StartJobRun
              - glue:GetJobRun
              - glue:GetJobRuns
              - glue:BatchStopJobRun
            Resource: "*"