service: smart-healthcare-data-pipeline
frameworkVersion: '4'

provider:
  name: aws
  runtime: python3.11
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}

custom:
  bucketName: smart-healthcare-iot-sim-${aws:accountId}-${sls:stage}

  glueDatabaseName: smart_healthcare_${sls:stage}

  bronzeCrawlerName: ${self:service}-${sls:stage}-bronze-crawler
  silverCrawlerName: ${self:service}-${sls:stage}-silver-crawler
  goldCrawlerName: ${self:service}-${sls:stage}-gold-crawler


  bronzeToSilverJobName: ${self:service}-${sls:stage}-bronze-to-silver
  silverToGoldJobName: ${self:service}-${sls:stage}-silver-to-gold


  bronzePrefix: bronze/clinical-deterioration/
  silverPrefix: silver/clinical-deterioration/
  goldPrefix: gold/clinical-deterioration/department_metrics/


  glueScriptKey: scripts/glue/bronze_to_silver.py
  goldScriptKey: scripts/glue/silver_to_gold.py


  athenaWorkGroupName: ${self:service}-${sls:stage}-workgroup
  athenaResultsPrefix: athena-results/

resources:
  Resources:

    SmartHealthcareGlueDatabase:
      Type: AWS::Glue::Database
      Properties:
        CatalogId:
          Ref: AWS::AccountId
        DatabaseInput:
          Name: ${self:custom.glueDatabaseName}
          Description: Glue database for Smart Healthcare Bronze and Silver tables.

    GlueServiceRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:service}-${sls:stage}-glue-service-role
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: glue.amazonaws.com
              Action:
                - sts:AssumeRole
        Policies:
          - PolicyName: smart-healthcare-glue-policy
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:PutObject
                    - s3:DeleteObject
                    - s3:ListBucket
                    - s3:GetBucketLocation
                  Resource:
                    - arn:aws:s3:::${self:custom.bucketName}
                    - arn:aws:s3:::${self:custom.bucketName}/*

                - Effect: Allow
                  Action:
                    - glue:*
                  Resource: "*"

                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                    - logs:AssociateKmsKey
                  Resource: "*"

    BronzeCrawler:
      Type: AWS::Glue::Crawler
      Properties:
        Name: ${self:custom.bronzeCrawlerName}
        Role:
          Fn::GetAtt:
            - GlueServiceRole
            - Arn
        DatabaseName:
          Ref: SmartHealthcareGlueDatabase
        Description: Crawls raw JSON clinical events in the Bronze zone.
        TablePrefix: bronze_
        Targets:
          S3Targets:
            - Path: s3://${self:custom.bucketName}/${self:custom.bronzePrefix}
        SchemaChangePolicy:
          UpdateBehavior: UPDATE_IN_DATABASE
          DeleteBehavior: LOG
        RecrawlPolicy:
          RecrawlBehavior: CRAWL_EVERYTHING

    BronzeToSilverGlueJob:
      Type: AWS::Glue::Job
      Properties:
        Name: ${self:custom.bronzeToSilverJobName}
        Role:
          Fn::GetAtt:
            - GlueServiceRole
            - Arn
        Description: Converts Bronze JSON clinical events into cleaned Silver Parquet.
        GlueVersion: "4.0"
        WorkerType: G.1X
        NumberOfWorkers: 2
        Timeout: 20
        ExecutionProperty:
          MaxConcurrentRuns: 1
        Command:
          Name: glueetl
          PythonVersion: "3"
          ScriptLocation: s3://${self:custom.bucketName}/${self:custom.glueScriptKey}
        DefaultArguments:
          "--job-language": "python"
          "--enable-metrics": "true"
          "--enable-continuous-cloudwatch-log": "true"
          "--TempDir": s3://${self:custom.bucketName}/tmp/glue/
          "--BUCKET_NAME": ${self:custom.bucketName}
          "--BRONZE_PREFIX": ${self:custom.bronzePrefix}
          "--SILVER_PREFIX": ${self:custom.silverPrefix}

    SilverToGoldGlueJob:
      Type: AWS::Glue::Job
      Properties:
        Name: ${self:custom.silverToGoldJobName}
        Role:
          Fn::GetAtt:
            - GlueServiceRole
            - Arn
        Description: Creates curated Gold analytics metrics from Silver Parquet clinical events.
        GlueVersion: "4.0"
        WorkerType: G.1X
        NumberOfWorkers: 2
        Timeout: 20
        ExecutionProperty:
          MaxConcurrentRuns: 1
        Command:
          Name: glueetl
          PythonVersion: "3"
          ScriptLocation: s3://${self:custom.bucketName}/${self:custom.goldScriptKey}
        DefaultArguments:
          "--job-language": "python"
          "--enable-metrics": "true"
          "--enable-continuous-cloudwatch-log": "true"
          "--TempDir": s3://${self:custom.bucketName}/tmp/glue/
          "--BUCKET_NAME": ${self:custom.bucketName}
          "--SILVER_PREFIX": ${self:custom.silverPrefix}
          "--GOLD_PREFIX": ${self:custom.goldPrefix}

    SilverCrawler:
      Type: AWS::Glue::Crawler
      Properties:
        Name: ${self:custom.silverCrawlerName}
        Role:
          Fn::GetAtt:
            - GlueServiceRole
            - Arn
        DatabaseName:
          Ref: SmartHealthcareGlueDatabase
        Description: Crawls cleaned Parquet clinical events in the Silver zone.
        TablePrefix: silver_
        Targets:
          S3Targets:
            - Path: s3://${self:custom.bucketName}/${self:custom.silverPrefix}
        SchemaChangePolicy:
          UpdateBehavior: UPDATE_IN_DATABASE
          DeleteBehavior: LOG
        RecrawlPolicy:
          RecrawlBehavior: CRAWL_EVERYTHING

    GoldCrawler:
      Type: AWS::Glue::Crawler
      Properties:
        Name: ${self:custom.goldCrawlerName}
        Role:
          Fn::GetAtt:
            - GlueServiceRole
            - Arn
        DatabaseName:
          Ref: SmartHealthcareGlueDatabase
        Description: Crawls curated Gold analytics Parquet metrics.
        TablePrefix: gold_
        Targets:
          S3Targets:
            - Path: s3://${self:custom.bucketName}/${self:custom.goldPrefix}
        SchemaChangePolicy:
          UpdateBehavior: UPDATE_IN_DATABASE
          DeleteBehavior: LOG
        RecrawlPolicy:
          RecrawlBehavior: CRAWL_EVERYTHING

    AthenaWorkGroup:
      Type: AWS::Athena::WorkGroup
      Properties:
        Name: ${self:custom.athenaWorkGroupName}
        Description: Athena workgroup for Smart Healthcare analytics queries.
        State: ENABLED
        WorkGroupConfiguration:
          EnforceWorkGroupConfiguration: true
          PublishCloudWatchMetricsEnabled: true
          ResultConfiguration:
            OutputLocation: s3://${self:custom.bucketName}/${self:custom.athenaResultsPrefix}

  Outputs:
    BucketName:
      Description: Existing S3 bucket used by the simulator and data pipeline.
      Value: ${self:custom.bucketName}

    GlueDatabaseName:
      Description: Glue database name.
      Value:
        Ref: SmartHealthcareGlueDatabase

    BronzeCrawlerName:
      Description: Bronze Glue crawler name.
      Value:
        Ref: BronzeCrawler

    SilverCrawlerName:
      Description: Silver Glue crawler name.
      Value:
        Ref: SilverCrawler

    GoldCrawlerName:
      Description: Gold Glue crawler name.
      Value:
        Ref: GoldCrawler

    BronzeToSilverJobName:
      Description: Glue job that converts Bronze JSON to Silver Parquet.
      Value:
        Ref: BronzeToSilverGlueJob
    
    SilverToGoldJobName:
      Description: Glue job that creates Gold analytics metrics.
      Value:
        Ref: SilverToGoldGlueJob
    
    SilverOutputPath:
      Description: Silver Parquet output path.
      Value: s3://${self:custom.bucketName}/${self:custom.silverPrefix}

    GoldOutputPath:
      Description: Gold curated Parquet output path.
      Value: s3://${self:custom.bucketName}/${self:custom.goldPrefix}

    AthenaWorkGroupName:
      Description: Athena workgroup for Smart Healthcare analytics.
      Value:
        Ref: AthenaWorkGroup

    AthenaResultsPath:
      Description: Athena query result location.
      Value: s3://${self:custom.bucketName}/${self:custom.athenaResultsPrefix}